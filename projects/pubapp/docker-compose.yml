version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: publication_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pgpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./init_users.sql:/docker-entrypoint-initdb.d/02_users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d publication_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pgpassword@db:5432/publication_db
      SECRET_KEY: change-this-secret-key-in-production-32-chars-min
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: publication_db
      DB_USER: postgres
      DB_PASSWORD: pgpassword
      DEFAULT_ORG_NAME: "ФИЦ ИВТ"
      DEFAULT_ORG_ID: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
