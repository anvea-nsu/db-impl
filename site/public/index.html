<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubDB Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --bg2:       #131620;
    --bg3:       #1a1e2e;
    --bg4:       #222740;
    --border:    #2a3050;
    --border2:   #3a4568;
    --text:      #c8d0e8;
    --text2:     #8090b8;
    --text3:     #4a5880;
    --accent:    #4d7cfe;
    --accent2:   #7b5cfa;
    --green:     #3ecf8e;
    --red:       #f85149;
    --yellow:    #e3b341;
    --orange:    #f0883e;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    6px;
    --transition: 0.15s ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--text2); font-weight: 400; }

  #db-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
    cursor: default;
  }

  #conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--mono);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }

  .spacer { flex: 1; }

  /* Import buttons in topbar */
  .import-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
  }
  .import-btn:hover { background: var(--bg4); border-color: var(--accent); color: var(--accent); }
  .import-btn .icon { font-size: 14px; }
  .import-btn.xml-btn:hover  { border-color: var(--orange); color: var(--orange); }
  .import-btn.json-btn:hover { border-color: var(--green);  color: var(--green);  }

  /* ── Stats bar ── */
  #statsbar {
    display: flex;
    gap: 1px;
    padding: 0;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: var(--bg2);
    flex: 1;
    cursor: pointer;
    transition: background var(--transition);
  }
  .stat-chip:hover { background: var(--bg3); }
  .stat-chip .label {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-chip .value {
    font-size: 16px;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    margin-left: auto;
  }

  /* ── Main layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 12px 16px 8px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }

  #search-input {
    width: calc(100% - 24px);
    margin: 8px 12px;
    padding: 6px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color var(--transition);
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text3); }

  #table-list {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0 12px;
  }

  .table-item {
    display: flex;
    align-items: center;
    padding: 7px 16px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    border-left: 2px solid transparent;
    transition: all var(--transition);
    gap: 8px;
  }
  .table-item:hover { background: var(--bg3); color: var(--text); }
  .table-item.active {
    background: var(--bg3);
    color: var(--accent);
    border-left-color: var(--accent);
  }
  .table-item .table-icon { font-size: 11px; color: var(--text3); }

  /* ── Content area ── */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  #table-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  #row-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  #search-rows {
    flex: 1;
    max-width: 300px;
    padding: 6px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color var(--transition);
  }
  #search-rows:focus { border-color: var(--accent); }
  #search-rows::placeholder { color: var(--text3); }

  .btn {
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn:hover { background: var(--bg4); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #3d6ee8; }
  .btn.danger { background: transparent; border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: rgba(248,81,73,0.1); }

  /* ── Grid ── */
  #grid-container {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  #grid {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }

  #grid thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  #grid th {
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  #grid th:hover { color: var(--text); background: var(--bg3); }
  #grid th.sorted { color: var(--accent); }
  #grid th .sort-arrow { margin-left: 4px; opacity: 0.6; }

  #grid td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 12px;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: middle;
  }

  #grid tr { transition: background var(--transition); }
  #grid tbody tr:hover { background: var(--bg2); }
  #grid tbody tr.selected { background: rgba(77,124,254,0.1); }

  td.null-val { color: var(--text3); font-style: italic; }
  td.bool-true  { color: var(--green); }
  td.bool-false { color: var(--red); }
  td.num-val { color: var(--yellow); }
  td.id-val  { color: var(--text3); }

  /* Actions column */
  .row-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity var(--transition);
  }
  tr:hover .row-actions { opacity: 1; }

  .row-btn {
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    transition: all var(--transition);
    background: transparent;
  }
  .row-btn.edit { color: var(--accent); border-color: var(--accent); }
  .row-btn.edit:hover { background: rgba(77,124,254,0.15); }
  .row-btn.del  { color: var(--red); border-color: var(--red); }
  .row-btn.del:hover  { background: rgba(248,81,73,0.12); }

  /* ── Pagination ── */
  #pagination {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    flex-shrink: 0;
  }

  .page-btn {
    padding: 4px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    transition: all var(--transition);
  }
  .page-btn:hover:not(:disabled) { background: var(--bg4); color: var(--text); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    width: 560px;
    max-width: 95vw;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: translateY(10px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .modal-close {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 18px;
    transition: all var(--transition);
  }
  .modal-close:hover { background: var(--bg3); color: var(--text); }

  .modal-body {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .form-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-label .type-badge {
    font-size: 9px;
    color: var(--accent2);
    background: rgba(123,92,250,0.1);
    border: 1px solid rgba(123,92,250,0.3);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .form-input {
    padding: 8px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color var(--transition);
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input.pk-field { color: var(--text3); background: var(--bg); }

  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

  #form-error {
    color: var(--red);
    font-family: var(--mono);
    font-size: 11px;
    margin-right: auto;
  }

  /* ── Import modal specific ── */
  .drop-zone {
    border: 2px dashed var(--border2);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text2);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(77,124,254,0.05);
    color: var(--accent);
  }
  .drop-zone .icon { font-size: 32px; display: block; margin-bottom: 8px; }
  .drop-zone .hint { font-size: 12px; color: var(--text3); margin-top: 6px; }

  #import-log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    max-height: 240px;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 2px;
  }
  #import-log.visible { display: flex; }
  .log-line { line-height: 1.4; word-break: break-all; }
  .log-line.info   { color: var(--text2); }
  .log-line.warn   { color: var(--yellow); }
  .log-line.error  { color: var(--red); }
  .log-line.success { color: var(--green); }

  /* ── Empty state ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text3);
    gap: 12px;
  }
  #empty-state .big-icon { font-size: 48px; }
  #empty-state p { font-family: var(--mono); font-size: 13px; }

  /* ── Loading ── */
  .loading-row td {
    text-align: center;
    padding: 40px;
    color: var(--text3);
    font-family: var(--mono);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">pub<span>db</span></div>
  <div id="db-info">loading...</div>
  <div id="conn-status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">connecting</span>
  </div>
  <div class="spacer"></div>
  <button class="import-btn xml-btn" onclick="openImport('xml')">
    <span class="icon">📄</span> Import XML
  </button>
  <button class="import-btn json-btn" onclick="openImport('json')">
    <span class="icon">📋</span> Import JSON
  </button>
</div>

<!-- STATS BAR -->
<div id="statsbar">
  <div class="stat-chip" onclick="loadTable('articles')">
    <span class="label">Articles</span>
    <span class="value" id="stat-articles">—</span>
  </div>
  <div class="stat-chip" onclick="loadTable('journals')">
    <span class="label">Journals</span>
    <span class="value" id="stat-journals">—</span>
  </div>
  <div class="stat-chip" onclick="loadTable('authors')">
    <span class="label">Authors</span>
    <span class="value" id="stat-authors">—</span>
  </div>
  <div class="stat-chip" onclick="loadTable('organizations')">
    <span class="label">Orgs</span>
    <span class="value" id="stat-organizations">—</span>
  </div>
  <div class="stat-chip" onclick="loadTable('databases')">
    <span class="label">Databases</span>
    <span class="value" id="stat-databases">—</span>
  </div>
  <div class="stat-chip" onclick="loadTable('issues')">
    <span class="label">Issues</span>
    <span class="value" id="stat-issues">—</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">Tables</div>
    <input id="search-input" placeholder="filter tables..." oninput="filterTables(this.value)">
    <div id="table-list"></div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="empty-state">
      <div class="big-icon">🗄️</div>
      <p>Select a table from the sidebar</p>
    </div>

    <div id="table-view" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <!-- Toolbar -->
      <div id="toolbar">
        <span id="table-title">—</span>
        <span id="row-count">0 rows</span>
        <input id="search-rows" placeholder="Search rows..." oninput="debounceSearch(this.value)">
        <div class="spacer"></div>
        <button class="btn primary" onclick="openAddRow()">＋ Add Row</button>
        <button class="btn" onclick="loadRows()">↻ Refresh</button>
      </div>

      <!-- Grid -->
      <div id="grid-container">
        <table id="grid">
          <thead id="grid-head"></thead>
          <tbody id="grid-body"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination"></div>
    </div>
  </div>

</div>

<!-- ── ROW EDIT MODAL ── -->
<div class="modal-overlay" id="row-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Edit Row</span>
      <button class="modal-close" onclick="closeModal('row-modal')">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <span id="form-error"></span>
      <button class="btn" onclick="closeModal('row-modal')">Cancel</button>
      <button class="btn primary" id="modal-save-btn" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<!-- ── IMPORT MODAL ── -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="import-modal-title">Import</span>
      <button class="modal-close" onclick="closeModal('import-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="drop-zone" id="drop-zone"
           onclick="document.getElementById('file-input').click()"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)">
        <span class="icon" id="drop-icon">📂</span>
        <div id="drop-text">Drop file here or click to select</div>
        <div class="hint" id="drop-hint">—</div>
      </div>
      <input type="file" id="file-input" onchange="onFileSelect(event)">
      <div id="import-log"></div>
    </div>
    <div class="modal-footer">
      <span id="import-status"></span>
      <button class="btn" onclick="closeModal('import-modal')">Close</button>
      <button class="btn primary" id="run-import-btn" onclick="runImport()" disabled>Run Import</button>
    </div>
  </div>
</div>

<!-- ── CONFIRM MODAL ── -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <span class="modal-title">Confirm Delete</span>
    </div>
    <div class="modal-body">
      <p style="color:var(--text2); font-size:13px;" id="confirm-msg">Are you sure?</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════
const state = {
  tables: [],
  currentTable: null,
  columns: [],
  rows: [],
  total: 0,
  page: 1,
  limit: 50,
  pages: 1,
  sortCol: '',
  sortDir: 'asc',
  search: '',
  editMode: null,  // 'add' | 'edit'
  editRow: null,
  pkCol: null,
  importType: null,
  importFile: null,
};

// ══════════════════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════════════════
async function init() {
  await checkConnection();
  await loadTables();
  await loadStats();
}

async function checkConnection() {
  try {
    const cfg = await api('/api/config');
    document.getElementById('db-info').textContent =
      `${cfg.user}@${cfg.host}:${cfg.port}/${cfg.database}`;

    const r = await api('/api/ping');
    setConnStatus(r.ok);
  } catch {
    setConnStatus(false);
  }
}

function setConnStatus(ok) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className = 'dot ' + (ok ? 'green' : 'red');
  label.textContent = ok ? 'connected' : 'error';
}

async function loadStats() {
  try {
    const stats = await api('/api/stats');
    for (const [k, v] of Object.entries(stats)) {
      const el = document.getElementById('stat-' + k);
      if (el) el.textContent = v.toLocaleString();
    }
  } catch {}
}

// ══════════════════════════════════════════════════════════════════════════
// Tables sidebar
// ══════════════════════════════════════════════════════════════════════════
async function loadTables() {
  state.tables = await api('/api/tables');
  renderTableList(state.tables);
}

function renderTableList(tables) {
  const list = document.getElementById('table-list');
  list.innerHTML = tables.map(t => `
    <div class="table-item ${t === state.currentTable ? 'active' : ''}"
         onclick="loadTable('${t}')">
      <span class="table-icon">▸</span>${t}
    </div>
  `).join('');
}

function filterTables(q) {
  const filtered = q
    ? state.tables.filter(t => t.toLowerCase().includes(q.toLowerCase()))
    : state.tables;
  renderTableList(filtered);
}

// ══════════════════════════════════════════════════════════════════════════
// Load table data
// ══════════════════════════════════════════════════════════════════════════
async function loadTable(name) {
  state.currentTable = name;
  state.page = 1;
  state.search = '';
  state.sortCol = '';
  state.sortDir = 'asc';
  document.getElementById('search-rows').value = '';

  // Update sidebar
  renderTableList(state.tables);

  // Show table view
  document.getElementById('empty-state').style.display = 'none';
  const tv = document.getElementById('table-view');
  tv.style.display = 'flex';

  document.getElementById('table-title').textContent = name;

  // Load columns
  state.columns = await api(`/api/tables/${name}/columns`);

  // Find PK
  state.pkCol = state.columns.find(c =>
    c.column_default && c.column_default.startsWith('nextval')
  )?.column_name || state.columns[0]?.column_name;

  renderHeader();
  await loadRows();
}

async function loadRows() {
  const table = state.currentTable;
  if (!table) return;

  // Show loading
  document.getElementById('grid-body').innerHTML =
    `<tr class="loading-row"><td colspan="99"><span class="spinner"></span>Loading…</td></tr>`;

  try {
    const params = new URLSearchParams({
      page:   state.page,
      limit:  state.limit,
      search: state.search,
      sort:   state.sortCol,
      dir:    state.sortDir,
    });
    const data = await api(`/api/tables/${table}/rows?${params}`);
    state.rows  = data.rows;
    state.total = data.total;
    state.pages = data.pages;

    document.getElementById('row-count').textContent =
      `${data.total.toLocaleString()} row${data.total !== 1 ? 's' : ''}`;

    renderBody();
    renderPagination();
  } catch (e) {
    document.getElementById('grid-body').innerHTML =
      `<tr class="loading-row"><td colspan="99" style="color:var(--red)">Error: ${e.message}</td></tr>`;
  }
}

function renderHeader() {
  const cols = state.columns;
  const head = document.getElementById('grid-head');
  const thCols = cols.map(c => {
    const sorted = c.column_name === state.sortCol;
    const arrow = sorted ? (state.sortDir === 'asc' ? '↑' : '↓') : '';
    return `<th class="${sorted ? 'sorted' : ''}"
                onclick="sortBy('${c.column_name}')">
      ${c.column_name}
      <span class="sort-arrow">${arrow}</span>
    </th>`;
  }).join('');
  head.innerHTML = `<tr>${thCols}<th style="width:110px">Actions</th></tr>`;
}

function renderBody() {
  const body = document.getElementById('grid-body');
  if (!state.rows.length) {
    body.innerHTML = `<tr class="loading-row"><td colspan="99">No rows found</td></tr>`;
    return;
  }

  body.innerHTML = state.rows.map(row => {
    const cells = state.columns.map(c => {
      const val = row[c.column_name];
      let cls = '', display = '';
      if (val === null || val === undefined) {
        cls = 'null-val'; display = 'null';
      } else if (typeof val === 'boolean') {
        cls = val ? 'bool-true' : 'bool-false';
        display = val ? 'true' : 'false';
      } else if (typeof val === 'number') {
        cls = c.column_name.endsWith('_id') || c.column_name === state.pkCol ? 'id-val' : 'num-val';
        display = val;
      } else {
        display = String(val);
      }
      const title = String(val ?? '').replace(/"/g, '&quot;');
      return `<td class="${cls}" title="${title}">${escHtml(String(display))}</td>`;
    }).join('');

    const pkVal = row[state.pkCol];
    return `<tr>
      ${cells}
      <td>
        <div class="row-actions">
          <button class="row-btn edit" onclick="openEditRow(${JSON.stringify(pkVal)})">Edit</button>
          <button class="row-btn del"  onclick="confirmDelete(${JSON.stringify(pkVal)})">Del</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const pg = document.getElementById('pagination');
  const { page, pages, total, limit } = state;
  if (pages <= 1) { pg.innerHTML = ''; return; }

  const start = (page - 1) * limit + 1;
  const end = Math.min(page * limit, total);

  let btns = '';
  // First / Prev
  btns += `<button class="page-btn" onclick="goPage(1)" ${page === 1 ? 'disabled' : ''}>«</button>`;
  btns += `<button class="page-btn" onclick="goPage(${page-1})" ${page === 1 ? 'disabled' : ''}>‹</button>`;

  // Page numbers (window of 5)
  const lo = Math.max(1, Math.min(page - 2, pages - 4));
  const hi = Math.min(pages, lo + 4);
  for (let i = lo; i <= hi; i++) {
    btns += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  btns += `<button class="page-btn" onclick="goPage(${page+1})" ${page === pages ? 'disabled' : ''}>›</button>`;
  btns += `<button class="page-btn" onclick="goPage(${pages})" ${page === pages ? 'disabled' : ''}>»</button>`;

  pg.innerHTML = `${btns}
    <span style="margin-left:auto;color:var(--text3)">
      ${start}–${end} of ${total.toLocaleString()}
    </span>`;
}

function goPage(p) {
  if (p < 1 || p > state.pages) return;
  state.page = p;
  loadRows();
}

function sortBy(col) {
  if (state.sortCol === col) {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sortCol = col;
    state.sortDir = 'asc';
  }
  state.page = 1;
  renderHeader();
  loadRows();
}

let searchTimer;
function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = val;
    state.page = 1;
    loadRows();
  }, 350);
}

// ══════════════════════════════════════════════════════════════════════════
// Row Edit / Add
// ══════════════════════════════════════════════════════════════════════════
function openAddRow() {
  state.editMode = 'add';
  state.editRow = null;
  document.getElementById('modal-title').textContent = `Add Row → ${state.currentTable}`;
  document.getElementById('form-error').textContent = '';
  renderForm({});
  openModal('row-modal');
}

function openEditRow(pkVal) {
  const row = state.rows.find(r => String(r[state.pkCol]) === String(pkVal));
  if (!row) return;
  state.editMode = 'edit';
  state.editRow = pkVal;
  document.getElementById('modal-title').textContent = `Edit Row → ${state.currentTable}`;
  document.getElementById('form-error').textContent = '';
  renderForm(row);
  openModal('row-modal');
}

function renderForm(row) {
  const body = document.getElementById('modal-body');
  const isPk = (c) => c.column_name === state.pkCol;
  body.innerHTML = state.columns.map(c => {
    const val = row[c.column_name];
    const isEdit = state.editMode === 'edit';
    const readonly = isEdit && isPk(c);
    const displayVal = val !== null && val !== undefined ? String(val) : '';
    return `
      <div class="form-field">
        <label class="form-label">
          ${c.column_name}
          <span class="type-badge">${c.data_type}</span>
          ${c.is_nullable === 'NO' ? '<span style="color:var(--red);font-size:10px">required</span>' : ''}
        </label>
        <input class="form-input ${readonly ? 'pk-field' : ''}"
               id="field-${c.column_name}"
               value="${escHtml(displayVal)}"
               ${readonly ? 'readonly' : ''}
               placeholder="${c.is_nullable === 'YES' ? 'null' : ''}">
      </div>`;
  }).join('');
}

async function saveRow() {
  const data = {};
  state.columns.forEach(c => {
    const el = document.getElementById('field-' + c.column_name);
    if (el) data[c.column_name] = el.value;
  });

  const errEl = document.getElementById('form-error');
  errEl.textContent = '';

  try {
    if (state.editMode === 'add') {
      await api(`/api/tables/${state.currentTable}/rows`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    } else {
      await api(`/api/tables/${state.currentTable}/rows/${state.editRow}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    }
    closeModal('row-modal');
    await loadRows();
    await loadStats();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

// ══════════════════════════════════════════════════════════════════════════
// Delete
// ══════════════════════════════════════════════════════════════════════════
function confirmDelete(pkVal) {
  document.getElementById('confirm-msg').textContent =
    `Delete row where ${state.pkCol} = ${pkVal}? This cannot be undone.`;
  document.getElementById('confirm-ok').onclick = async () => {
    try {
      await api(`/api/tables/${state.currentTable}/rows/${pkVal}`, { method: 'DELETE' });
      closeModal('confirm-modal');
      await loadRows();
      await loadStats();
    } catch (e) {
      alert('Error: ' + e.message);
    }
  };
  openModal('confirm-modal');
}

// ══════════════════════════════════════════════════════════════════════════
// Import
// ══════════════════════════════════════════════════════════════════════════
function openImport(type) {
  state.importType = type;
  state.importFile = null;
  document.getElementById('import-modal-title').textContent =
    type === 'xml' ? '📄 Import XML (eLibrary Articles)' : '📋 Import JSON (Journals)';
  document.getElementById('drop-icon').textContent = type === 'xml' ? '📄' : '📋';
  document.getElementById('drop-text').textContent = 'Drop file here or click to select';
  document.getElementById('drop-hint').textContent =
    type === 'xml' ? 'Accepts .xml files from eLibrary' : 'Accepts .json files (journalrank format)';
  document.getElementById('file-input').accept = type === 'xml' ? '.xml' : '.json';
  document.getElementById('import-log').className = 'import-log';
  document.getElementById('import-log').innerHTML = '';
  document.getElementById('import-status').textContent = '';
  document.getElementById('run-import-btn').disabled = true;
  openModal('import-modal');
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) setImportFile(file);
}

function setImportFile(file) {
  state.importFile = file;
  document.getElementById('drop-text').textContent = file.name;
  document.getElementById('drop-hint').textContent =
    (file.size / 1024).toFixed(1) + ' KB';
  document.getElementById('run-import-btn').disabled = false;
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}
function onDragLeave(e) {
  document.getElementById('drop-zone').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setImportFile(file);
}

async function runImport() {
  if (!state.importFile) return;

  const log = document.getElementById('import-log');
  log.className = 'import-log visible';
  log.innerHTML = '';
  document.getElementById('run-import-btn').disabled = true;
  document.getElementById('import-status').textContent = '⏳ Running…';

  const appendLog = (text, cls = 'info') => {
    const line = document.createElement('div');
    line.className = 'log-line ' + cls;
    line.textContent = text;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  };

  const formData = new FormData();
  formData.append('file', state.importFile);

  const endpoint = state.importType === 'xml' ? '/api/import/xml' : '/api/import/json';

  try {
    const resp = await fetch(endpoint, { method: 'POST', body: formData });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const msg = JSON.parse(line.slice(6));
          if (msg.type === 'stdout') {
            const t = msg.text.toLowerCase();
            const cls = t.includes('ошибк') || t.includes('error') || t.includes('✗') ? 'error'
                      : t.includes('предупреж') || t.includes('warn')  || t.includes('конфликт') ? 'warn'
                      : t.includes('+') || t.includes('готово') || t.includes('итоги') ? 'success'
                      : 'info';
            appendLog(msg.text, cls);
          } else if (msg.type === 'stderr') {
            appendLog(msg.text, 'warn');
          } else if (msg.type === 'exit') {
            const ok = msg.code === 0;
            appendLog(`\n— Process exited with code ${msg.code} —`, ok ? 'success' : 'error');
            document.getElementById('import-status').textContent = ok ? '✅ Done' : '❌ Errors';
          } else if (msg.type === 'error') {
            appendLog('Server error: ' + msg.text, 'error');
            document.getElementById('import-status').textContent = '❌ Failed';
          }
        } catch {}
      }
    }
    await loadStats();
    if (state.currentTable) await loadRows();
  } catch (e) {
    appendLog('Network error: ' + e.message, 'error');
    document.getElementById('import-status').textContent = '❌ Failed';
  }

  document.getElementById('run-import-btn').disabled = false;
}

// ══════════════════════════════════════════════════════════════════════════
// Modal helpers
// ══════════════════════════════════════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

// ══════════════════════════════════════════════════════════════════════════
// API helper
// ══════════════════════════════════════════════════════════════════════════
async function api(url, opts = {}) {
  const r = await fetch(url, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

// ══════════════════════════════════════════════════════════════════════════
// Utilities
// ══════════════════════════════════════════════════════════════════════════
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════
// Keyboard shortcuts
// ══════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open')
      .forEach(el => el.classList.remove('open'));
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const modal = document.querySelector('.modal-overlay.open');
    if (modal && modal.id === 'row-modal') saveRow();
  }
});

// ══════════════════════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
